<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кликер</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game">

    <h1>Кликер 🚀</h1>
    <p>
      <span id="score">0</span>
    </p>
    <p>
      <span id="power">1</span>
    </p>
    <button id="clickBtn">
      Жми
    </button>
    <div class="shop">
      <h2>Магазин</h2>
      <button id="upgradeBtn">
        Улучшить клик (-10)
      </button>
      <button id="autoBtn">
        Авто-кликер (-50)
      </button>
      <p id="message"></p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
